<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Healthician Path Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>body{background:#f1f5f9;}</style>
</head>
<body class="p-6">
<div class="max-w-6xl mx-auto">
  <div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold text-blue-800"><i class="fas fa-user-shield"></i> Admin Panel</h1><a href="index.html" class="bg-gray-600 text-white px-4 py-2 rounded">← Back to Site</a></div>
  
  <!-- Manage Tests -->
  <div class="bg-white p-5 rounded-xl shadow mb-8"><h2 class="text-2xl font-semibold flex items-center"><i class="fas fa-flask text-green-600 mr-2"></i> Manage Tests</h2><div id="testList" class="my-4 space-y-2"></div><div class="flex gap-2 mt-3"><input type="text" id="newTestName" placeholder="New test name" class="border p-2 rounded flex-1"><input type="text" id="newTestIcon" placeholder="Icon class (e.g., fas fa-droplet)" class="border p-2 rounded flex-1"><button id="addTestBtn" class="bg-green-600 text-white px-4 py-2 rounded">Add Test</button></div></div>
  
  <!-- Manage Packages -->
  <div class="bg-white p-5 rounded-xl shadow mb-8"><h2 class="text-2xl font-semibold"><i class="fas fa-box"></i> Manage Packages & Prices</h2><div id="packagesList" class="my-4 space-y-4"></div><div class="border-t pt-4"><h3 class="font-bold">Add New Package</h3><div class="grid grid-cols-2 gap-2"><input type="text" id="pkgName" placeholder="Package name" class="border p-2 rounded"><input type="text" id="pkgPrice" placeholder="Price (e.g., ₹1999)" class="border p-2 rounded"><textarea id="pkgFeatures" placeholder="Features (comma separated)" class="border p-2 rounded col-span-2"></textarea><button id="addPackageBtn" class="bg-blue-600 text-white p-2 rounded col-span-2">Add Package</button></div></div></div>
  
  <!-- Enquiries -->
  <div class="bg-white p-5 rounded-xl shadow"><h2 class="text-2xl font-semibold"><i class="fas fa-envelope"></i> Enquiries & Bookings</h2><div id="enquiriesList" class="mt-4 max-h-96 overflow-y-auto"></div><button id="clearEnquiries" class="mt-3 bg-red-500 text-white px-4 py-1 rounded text-sm">Clear All Enquiries</button></div>
</div>

<script>
  // Load data
  function loadTests() { return JSON.parse(localStorage.getItem("lab_tests") || "[]"); }
  function saveTests(tests) { localStorage.setItem("lab_tests", JSON.stringify(tests)); }
  function loadPackages() { return JSON.parse(localStorage.getItem("lab_packages") || "[]"); }
  function savePackages(pkgs) { localStorage.setItem("lab_packages", JSON.stringify(pkgs)); }
  function loadEnquiries() { return JSON.parse(localStorage.getItem("enquiries") || "[]"); }
  function saveEnquiries(e) { localStorage.setItem("enquiries", JSON.stringify(e)); }
  
  function renderTests() {
    let tests = loadTests();
    document.getElementById("testList").innerHTML = tests.map((t,idx) => `<div class="flex justify-between items-center bg-gray-50 p-2 rounded"><span><i class="${t.icon||'fas fa-flask'} mr-2"></i> ${t.name}</span><div><button class="editTest text-blue-600 mr-2" data-idx="${idx}"><i class="fas fa-edit"></i></button><button class="delTest text-red-600" data-idx="${idx}"><i class="fas fa-trash"></i></button></div></div>`).join('');
    document.querySelectorAll('.editTest').forEach(btn => btn.onclick = () => { let idx = btn.dataset.idx, tests = loadTests(); let newName = prompt("Edit test name", tests[idx].name); if(newName) { tests[idx].name = newName; let newIcon = prompt("Icon class", tests[idx].icon || "fas fa-flask"); tests[idx].icon = newIcon; saveTests(tests); renderTests(); } });
    document.querySelectorAll('.delTest').forEach(btn => btn.onclick = () => { let idx = btn.dataset.idx, tests = loadTests(); tests.splice(idx,1); saveTests(tests); renderTests(); });
  }
  function renderPackages() {
    let pkgs = loadPackages();
    document.getElementById("packagesList").innerHTML = pkgs.map((p,idx) => `<div class="border rounded p-3 bg-gray-50"><div class="flex justify-between"><span class="font-bold text-lg">${p.name}</span><span class="text-green-700 font-bold">${p.price}</span><div><button class="editPkgBtn text-blue-600 mr-2" data-idx="${idx}">Edit</button><button class="delPkgBtn text-red-600" data-idx="${idx}">Delete</button></div></div><ul class="text-sm ml-5">${p.features.map(f=>`<li>✓ ${f}</li>`).join('')}</ul></div>`).join('');
    document.querySelectorAll('.editPkgBtn').forEach(btn => btn.onclick = () => { let idx = btn.dataset.idx, pkgs = loadPackages(); let newName = prompt("Package name", pkgs[idx].name); if(newName) pkgs[idx].name = newName; let newPrice = prompt("Price", pkgs[idx].price); if(newPrice) pkgs[idx].price = newPrice; let newFeatures = prompt("Features (comma separated)", pkgs[idx].features.join(',')); if(newFeatures) pkgs[idx].features = newFeatures.split(',').map(s=>s.trim()); savePackages(pkgs); renderPackages(); });
    document.querySelectorAll('.delPkgBtn').forEach(btn => btn.onclick = () => { let idx = btn.dataset.idx, pkgs = loadPackages(); pkgs.splice(idx,1); savePackages(pkgs); renderPackages(); });
  }
  function renderEnquiries() {
    let enquiries = loadEnquiries();
    if(enquiries.length===0) { document.getElementById("enquiriesList").innerHTML = "<p class='text-gray-500'>No enquiries yet.</p>"; return; }
    document.getElementById("enquiriesList").innerHTML = enquiries.map((e,i) => `<div class="border-b p-2"><strong>${e.type || 'Enquiry'}</strong> - ${e.name || e.patientName || 'N/A'} (${e.mobile || e.email})<br><small>${JSON.stringify(e)}</small><button class="delEnq text-red-500 text-sm ml-2" data-idx="${i}">Delete</button></div>`).join('');
    document.querySelectorAll('.delEnq').forEach(btn => btn.onclick = () => { let enquiries = loadEnquiries(); enquiries.splice(btn.dataset.idx,1); saveEnquiries(enquiries); renderEnquiries(); });
  }
  
  document.getElementById("addTestBtn").onclick = () => {
    let name = document.getElementById("newTestName").value.trim();
    let icon = document.getElementById("newTestIcon").value.trim() || "fas fa-flask";
    if(!name) return alert("Enter test name");
    let tests = loadTests(); tests.push({name, icon}); saveTests(tests); renderTests(); document.getElementById("newTestName").value = ""; document.getElementById("newTestIcon").value = "";
  };
  document.getElementById("addPackageBtn").onclick = () => {
    let name = document.getElementById("pkgName").value.trim();
    let price = document.getElementById("pkgPrice").value.trim();
    let features = document.getElementById("pkgFeatures").value.split(',').map(s=>s.trim()).filter(s=>s);
    if(!name || !price) return alert("Name & price required");
    let pkgs = loadPackages(); pkgs.push({name, price, features}); savePackages(pkgs); renderPackages(); document.getElementById("pkgName").value = ""; document.getElementById("pkgPrice").value = ""; document.getElementById("pkgFeatures").value = "";
  };
  document.getElementById("clearEnquiries").onclick = () => { if(confirm("Clear all enquiries?")) { saveEnquiries([]); renderEnquiries(); } };
  
  renderTests(); renderPackages(); renderEnquiries();
</script>
</body>
</html>
