<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Healthician Path Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 p-4">

<div id="loginBox" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow text-center mt-20">
  <i class="fas fa-lock text-5xl text-blue-600 mb-4"></i>
  <h2 class="text-2xl font-bold">Admin Login</h2>
  <input type="password" id="password" placeholder="Enter Password" class="w-full border p-3 rounded-lg my-4">
  <button onclick="login()" class="bg-blue-600 text-white px-6 py-2 rounded-lg w-full">Login</button>
  <p id="errorMsg" class="text-red-500 mt-2 hidden">Wrong password!</p>
</div>

<div id="adminPanel" class="hidden max-w-7xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-blue-800"><i class="fas fa-user-shield"></i> Admin Panel</h1>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
  </div>

  <!-- Price Editor -->
  <div class="bg-white p-5 rounded-xl shadow mb-8">
    <h2 class="text-2xl font-semibold mb-4"><i class="fas fa-tag text-green-600"></i> Package Prices</h2>
    <div id="priceEditor" class="space-y-3"></div>
    <button onclick="savePrices()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded">Save Changes</button>
    <p id="saveMsg" class="text-sm mt-2 hidden"></p>
  </div>

  <!-- Enquiries -->
  <div class="bg-white p-5 rounded-xl shadow">
    <h2 class="text-2xl font-semibold mb-4"><i class="fas fa-envelope"></i> Enquiries & Bookings</h2>
    <div id="enquiriesList" class="max-h-96 overflow-y-auto"></div>
    <button onclick="clearEnquiries()" class="mt-3 bg-red-500 text-white px-4 py-1 rounded text-sm">Clear All</button>
  </div>
</div>

<script>
  const PASSWORD = "admin123";
  let PACKAGES = ["Basic Health Package", "Advanced Health Package", "Executive Health Package"];

  function loadPrices() {
    let saved = localStorage.getItem("package_prices");
    if (saved) return JSON.parse(saved);
    let defaultPrices = { "Basic Health Package": 999, "Advanced Health Package": 1999, "Executive Health Package": 3499 };
    localStorage.setItem("package_prices", JSON.stringify(defaultPrices));
    return defaultPrices;
  }

  function renderPriceEditor() {
    let prices = loadPrices();
    let container = document.getElementById("priceEditor");
    container.innerHTML = PACKAGES.map(pkg => `
      <div class="flex flex-col md:flex-row gap-3 p-3 bg-gray-50 rounded">
        <div class="w-full md:w-1/3 font-semibold">${pkg}</div>
        <div class="flex gap-2">
          <span>₹</span>
          <input type="number" id="price_${pkg.replace(/ /g, '_')}" value="${prices[pkg]}" class="border p-2 rounded w-32" step="100">
        </div>
      </div>
    `).join('');
  }

  function savePrices() {
    let prices = loadPrices();
    for (let pkg of PACKAGES) {
      let input = document.getElementById(`price_${pkg.replace(/ /g, '_')}`);
      if (input) prices[pkg] = parseInt(input.value);
    }
    localStorage.setItem("package_prices", JSON.stringify(prices));
    let msg = document.getElementById("saveMsg");
    msg.textContent = "✓ Prices saved!";
    msg.classList.remove("hidden");
    setTimeout(() => msg.classList.add("hidden"), 2000);
  }

  function loadEnquiries() { return JSON.parse(localStorage.getItem("enquiries") || "[]"); }
  function saveEnquiries(e) { localStorage.setItem("enquiries", JSON.stringify(e)); }

  function renderEnquiries() {
    let enquiries = loadEnquiries();
    let container = document.getElementById("enquiriesList");
    if (enquiries.length === 0) { container.innerHTML = "<p class='text-gray-500'>No enquiries yet.</p>"; return; }
    container.innerHTML = enquiries.map((e,i) => `
      <div class="border-b p-2"><strong>${e.type || 'Enquiry'}</strong><br>📅 ${new Date(e.date).toLocaleString()}<br><pre class="text-xs">${JSON.stringify(e, null, 2)}</pre><button onclick="deleteEnquiry(${i})" class="text-red-500 text-sm mt-1">Delete</button></div>
    `).join('');
  }

  function deleteEnquiry(i) { let e = loadEnquiries(); e.splice(i,1); saveEnquiries(e); renderEnquiries(); }
  function clearEnquiries() { if(confirm("Clear all?")) { saveEnquiries([]); renderEnquiries(); } }

  function login() { let pwd = document.getElementById("password").value; if(pwd === PASSWORD) { document.getElementById("loginBox").classList.add("hidden"); document.getElementById("adminPanel").classList.remove("hidden"); renderPriceEditor(); renderEnquiries(); } else { document.getElementById("errorMsg").classList.remove("hidden"); } }
  function logout() { document.getElementById("loginBox").classList.remove("hidden"); document.getElementById("adminPanel").classList.add("hidden"); document.getElementById("password").value = ""; }
</script>
</body>
</html>
